title: "[Use Case] "
labels:
  - use-case
body:
  - type: input
    id: role
    attributes:
      label: Role or team
      placeholder: Founder, agency, technical marketer, B2B growth team...
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Business problem
      description: Describe the problem SignalOS could help solve.
    validations:
      required: true

  - type: textarea
    id: current
    attributes:
      label: Current workflow
      description: What tools, people, and manual steps are involved today?
    validations:
      required: true

  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: What measurable or observable result matters?
    validations:
      required: true

  - type: textarea
    id: fit
    attributes:
      label: Where SignalOS may fit
      description: Which scan, recommendation, execution, connector, or reporting capability would be useful?

  - type: textarea
    id: blocker
    attributes:
      label: Adoption blocker
      description: What is missing before this use case becomes viable?

  - type: checkboxes
    id: safety
    attributes:
      label: Safety confirmation
      options:
        - label: This use case contains no confidential customer data, secrets, or private repository contents.
          required: true
