title: "[Beta Experience] "
labels:
  - beta-feedback
body:
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Describe your role, use case, and what you tested.
    validations:
      required: true
  - type: textarea
    id: strongest
    attributes:
      label: Strongest part of the experience
    validations:
      required: true
  - type: textarea
    id: weakest
    attributes:
      label: Weakest or most confusing part
    validations:
      required: true
  - type: textarea
    id: value
    attributes:
      label: Practical or commercial value
  - type: textarea
    id: next
    attributes:
      label: Highest-priority improvement
    validations:
      required: true
