title: "[Integration Request] "
labels:
  - integration-request
body:
  - type: input
    id: platform
    attributes:
      label: Requested platform or connector
    validations:
      required: true
  - type: textarea
    id: workflow
    attributes:
      label: Real workflow
    validations:
      required: true
  - type: dropdown
    id: mode
    attributes:
      label: Required capability
      options:
        - Read-only intelligence
        - Approval-gated write
        - Both read and write
        - Unsure
    validations:
      required: true
  - type: textarea
    id: value
    attributes:
      label: Business value
    validations:
      required: true
  - type: textarea
    id: controls
    attributes:
      label: Required controls
